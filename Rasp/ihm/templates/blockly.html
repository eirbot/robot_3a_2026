<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Studio Stratégie - Robot 2026</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/blockly.css') }}">

    <script src="https://unpkg.com/blockly/blockly_compressed.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/python_compressed.js"></script>
    <script src="https://unpkg.com/blockly/msg/fr.js"></script>
</head>

<body>

    <div class="header">
        <a href="/" class="btn-back">⬅ RETOUR</a>
        <div style="font-weight:bold;">STRAT STUDIO 🧩</div>
        <div class="sys-info" id="sys-info">...</div>
    </div>

    <div id="controls"
        style="background:#1c232b; padding:10px; display:flex; gap:10px; align-items:center; border-bottom:1px solid #333;">
        <select id="stratSelect" class="strat-select" style="display:inline-block;">
            <option value="" disabled selected>Choisir...</option>
        </select>
        <button id="loadBtn" class="btn-sys">📂 Charger</button>

        <div style="flex-grow: 1;"></div>
        <div style="width: 2px; height: 30px; background: #555; margin: 0 15px;"></div>
        <button id="previewBtn" class="btn-sys" style="background: #6f42c1;">👁️ Voir Trajet</button>
        <button id="simuBtn" class="btn-sys" style="background: #E91E63;">▶️ Simuler</button>

        <input type="text" id="filename" placeholder="Nom de la strat" value="nouvelle_strat"
            style="padding:5px; background:#333; color:white; border:1px solid #555; border-radius:5px;">
        <button id="saveBtn" class="btn-sys" style="background: #4CAF50;">💾 Sauvegarder</button>

        <div id="status" style="margin-left: 20px; font-weight: bold; color: #4cd137;"></div>
    </div>

    <div id="main-container">
        <div id="blocklyArea">
            <div id="blocklyDiv"></div>
        </div>
        <div id="simuArea">
            <h4 style="margin-top: 0;">Simulation (3000x2000 mm)</h4>
            <canvas id="simCanvas" width="600" height="400"></canvas>
            <div id="simConsole"
                style="width: 100%; height: 150px; background: #222; color: #0f0; font-family: monospace; padding: 10px; margin-top: 10px; overflow-y: auto; font-size: 0.8em;">
                > Console de simulation prête...
            </div>
        </div>
    </div>

    <xml xmlns="https://developers.google.com/blockly/xml" id="toolbox" style="display: none">
        <category name="Configuration" colour="#a55b80">
            <block type="robot_start"></block>
        </category>
        <category name="Mouvements" colour="#5C81A6">
            <block type="robot_goto"></block>
            <block type="robot_stop"></block>
        </category>
        <category name="Actionneurs" colour="#5CA65C">
            <block type="prendre_kapla"></block>
            <block type="poser_kapla"></block>
            <block type="retourner_kapla"></block>
        </category>
        <category name="Sons & Lumières" colour="#9b59b6">
            <block type="play_animation"></block>
            <block type="play_sound"></block>
        </category>
        <category name="Logique" colour="%{BKY_LOGIC_HUE}">
            <block type="controls_repeat_ext"></block>
            <block type="math_number"></block>
        </category>
    </xml>

    <img id="imgTable" src="{{ url_for('static', filename='img/table_coupe_2026.png') }}" style="display: none;">
    <img id="imgRobot" src="{{ url_for('static', filename='img/robot.png') }}" style="display: none;">

    <script src="{{ url_for('static', filename='js/common.js') }}"></script>
    <script src="{{ url_for('static', filename='js/blockly.js') }}"></script>
</body>

</html>
